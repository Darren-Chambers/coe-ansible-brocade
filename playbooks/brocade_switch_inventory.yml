---
# Brocade FOS switch inventory — gathers zoning, chassis, fabric config,
# and live nameserver (WWN login table) data for every switch in the AAP
# inventory, looping across each switch's logical switches (VFIDs).
#
# Runs hosts: all so Ansible's own inventory loop covers every switch —
# no extra_var needed at launch time. fos_ip_addr/fos_user_name/
# fos_password come from group_vars/all/vars.yml, which looks them up in
# the encrypted group_vars/all/vault.yml by inventory_hostname — same
# pattern as coe_server_facts.
#
# connection: local is required even though this targets real inventory
# hosts — the brocade.fos modules call the switch's REST API directly,
# there's no SSH/Python execution on the switch itself.
- hosts: all
  connection: local
  gather_facts: False
  collections:
    - brocade.fos
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    credential:
      fos_ip_addr: "{{ fos_ip_addr }}"
      fos_user_name: "{{ fos_user_name }}"
      fos_password: "{{ fos_password }}"
      https: "{{ fos_https }}"
    hismog_url: "{{ survey_hismog_url | default('http://192.168.183.110:5000/api/switch_facts') }}"
    # Set to false via extra_vars to run this playbook standalone (no POST
    # back to HiSMOG) — e.g. for manual troubleshooting, or override
    # hismog_url above to point the POST at a different consumer entirely.
    post_to_hismog: true
  tasks:
    - name: Attempt to gather logical switches (VFIDs) — only works if VF is enabled
      brocade_list_obj_facts:
        credential: "{{ credential }}"
        module_name: "brocade_fibrechannel_logical_switch"
        list_name: "fibrechannel_logical_switch"
      register: logical_switch_facts
      ignore_errors: yes

    - name: Determine whether Virtual Fabrics is enabled on this switch
      set_fact:
        vf_enabled: "{{ logical_switch_facts is succeeded and logical_switch_facts.ansible_facts is defined and logical_switch_facts.ansible_facts.fibrechannel_logical_switch is defined }}"

    - name: Build the list of VFIDs to iterate — real VFIDs if VF enabled, otherwise just -1
      set_fact:
        vfid_list: >-
          {{
            (logical_switch_facts.ansible_facts.fibrechannel_logical_switch | map(attribute='fabric_id') | list)
            if vf_enabled else [-1]
          }}

    - name: Print VFIDs (or -1 for non-VF switches)
      debug:
        msg: "vf_enabled={{ vf_enabled }}, vfid_list={{ vfid_list }}"

    - name: gather facts
      brocade_facts:
        credential: "{{ credential }}"
        vfid: "{{ item }}"
        gather_subset:
          - brocade_zoning
          - brocade_chassis_chassis
          - brocade_fibrechannel_configuration_fabric
          - brocade_fibrechannel_switch
          - brocade_fabric_fabric_switch
          - brocade_interface_fibrechannel
      loop: "{{ vfid_list }}"
      loop_control:
        label: "VFID {{ item }}"
      ignore_errors: yes
      register: broc_facts

    - name: Get nameserver content
      brocade_list_obj_facts:
        credential: "{{ credential }}"
        vfid: "{{ item }}"
        module_name: "brocade-name-server"
        list_name: "fibrechannel-name-server"
      loop: "{{ vfid_list }}"
      loop_control:
        label: "VFID {{ item }}"
      register: fibrechannel_name_server
      ignore_errors: yes

    - name: Combine broc_facts and nameserver facts
      set_fact:
        combined_brocade_facts:
          vf_enabled: "{{ vf_enabled }}"
          vfid_list: "{{ vfid_list }}"
          zoning_and_chassis: "{{ broc_facts.results }}"
          fibre_channel_nameserver: "{{ fibrechannel_name_server.results }}"
          logical_switch_facts: "{{ logical_switch_facts if vf_enabled else omit }}"

    # ── Diagnostic output — still printed to the job log for visibility
    - name: Print raw output for field-name inspection
      debug:
        var: combined_brocade_facts

    - name: POST combined facts to HiSMOG dashboard
      uri:
        url: "{{ hismog_url }}"
        method: POST
        body_format: json
        body:
          brocade_switch: "{{ inventory_hostname }}"
          combined_brocade_facts: "{{ combined_brocade_facts }}"
        status_code: 200
      delegate_to: localhost
      when: post_to_hismog | bool
